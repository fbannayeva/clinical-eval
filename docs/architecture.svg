<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Clinical-Eval architecture diagram</title>
  <desc>Five-layer architecture: data sources, ingestion, storage, AI agents, and output layers</desc>

  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; fill: #3d3d3a; }
      .th  { font-size: 13px; font-weight: 600; }
      .ts  { font-size: 11px; fill: #73726c; }
      .layer-label { font-size: 10px; fill: #73726c; }
      .divider { stroke: #ccc; stroke-width: 0.5; stroke-dasharray: 4 4; }
      .arr { stroke: #b4b2a9; stroke-width: 1.2; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Layer labels -->
  <text class="layer-label" x="18" y="88"  text-anchor="middle" transform="rotate(-90,18,88)">Data</text>
  <text class="layer-label" x="18" y="185" text-anchor="middle" transform="rotate(-90,18,185)">Ingest</text>
  <text class="layer-label" x="18" y="285" text-anchor="middle" transform="rotate(-90,18,285)">Storage</text>
  <text class="layer-label" x="18" y="390" text-anchor="middle" transform="rotate(-90,18,390)">Agents</text>
  <text class="layer-label" x="18" y="500" text-anchor="middle" transform="rotate(-90,18,500)">Output</text>

  <!-- Dividers -->
  <line class="divider" x1="36" y1="130" x2="650" y2="130"/>
  <line class="divider" x1="36" y1="230" x2="650" y2="230"/>
  <line class="divider" x1="36" y1="335" x2="650" y2="335"/>
  <line class="divider" x1="36" y1="445" x2="650" y2="445"/>

  <!-- Layer 1: Data Sources -->
  <rect x="50" y="50" width="168" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th" x="134" y="74" text-anchor="middle">PubMed API</text>
  <text class="ts" x="134" y="92" text-anchor="middle">Abstracts, full text</text>

  <rect x="256" y="50" width="168" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th" x="340" y="74" text-anchor="middle">ClinicalTrials.gov</text>
  <text class="ts" x="340" y="92" text-anchor="middle">NCT records, endpoints</text>

  <rect x="462" y="50" width="168" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="th" x="546" y="74" text-anchor="middle">FDA / EMA</text>
  <text class="ts" x="546" y="92" text-anchor="middle">Drug approvals</text>

  <line class="arr" x1="134" y1="106" x2="200" y2="146" marker-end="url(#arrow)"/>
  <line class="arr" x1="340" y1="106" x2="340" y2="146" marker-end="url(#arrow)"/>
  <line class="arr" x1="546" y1="106" x2="480" y2="146" marker-end="url(#arrow)"/>

  <!-- Layer 2: Ingestion -->
  <rect x="50" y="146" width="168" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="134" y="170" text-anchor="middle">Fetch + parse</text>
  <text class="ts" x="134" y="188" text-anchor="middle">Dedup, rate limiting</text>

  <rect x="256" y="146" width="168" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="340" y="170" text-anchor="middle">BioBERT chunking</text>
  <text class="ts" x="340" y="188" text-anchor="middle">Semantic splits, overlap</text>

  <rect x="462" y="146" width="168" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="546" y="170" text-anchor="middle">Embedding</text>
  <text class="ts" x="546" y="188" text-anchor="middle">sentence-transformers</text>

  <line class="arr" x1="218" y1="174" x2="254" y2="174" marker-end="url(#arrow)"/>
  <line class="arr" x1="424" y1="174" x2="460" y2="174" marker-end="url(#arrow)"/>
  <line class="arr" x1="134" y1="202" x2="134" y2="246" marker-end="url(#arrow)"/>
  <line class="arr" x1="546" y1="202" x2="440" y2="246" marker-end="url(#arrow)"/>

  <!-- Layer 3: Storage -->
  <rect x="50" y="246" width="168" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th" x="134" y="270" text-anchor="middle">PostgreSQL / SQLite</text>
  <text class="ts" x="134" y="288" text-anchor="middle">Metadata, audit log</text>

  <rect x="256" y="246" width="168" height="56" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="th" x="340" y="270" text-anchor="middle">Qdrant Cloud</text>
  <text class="ts" x="340" y="288" text-anchor="middle">Vector DB, semantic search</text>

  <rect x="462" y="246" width="168" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="546" y="270" text-anchor="middle">Langfuse</text>
  <text class="ts" x="546" y="288" text-anchor="middle">LLM observability</text>

  <line class="arr" x1="200" y1="274" x2="256" y2="274" marker-end="url(#arrow)"/>
  <line class="arr" x1="340" y1="302" x2="210" y2="351" marker-end="url(#arrow)"/>
  <line class="arr" x1="340" y1="302" x2="340" y2="351" marker-end="url(#arrow)"/>
  <line class="arr" x1="340" y1="302" x2="470" y2="351" marker-end="url(#arrow)"/>

  <!-- Layer 4: Agents -->
  <rect x="50" y="351" width="168" height="64" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text class="th" x="134" y="374" text-anchor="middle">Research agent</text>
  <text class="ts" x="134" y="392" text-anchor="middle">RAG retrieval</text>
  <text class="ts" x="134" y="408" text-anchor="middle">LangChain</text>

  <rect x="256" y="351" width="168" height="64" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text class="th" x="340" y="374" text-anchor="middle">Extraction agent</text>
  <text class="ts" x="340" y="392" text-anchor="middle">NCT, endpoints, population</text>
  <text class="ts" x="340" y="408" text-anchor="middle">Pydantic output</text>

  <rect x="462" y="351" width="168" height="64" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text class="th" x="546" y="374" text-anchor="middle">Summary agent</text>
  <text class="ts" x="546" y="392" text-anchor="middle">Report synthesis</text>
  <text class="ts" x="546" y="408" text-anchor="middle">Confidence scoring</text>

  <line class="arr" x1="218" y1="383" x2="254" y2="383" marker-end="url(#arrow)"/>
  <line class="arr" x1="424" y1="383" x2="460" y2="383" marker-end="url(#arrow)"/>
  <line class="arr" x1="546" y1="415" x2="340" y2="461" marker-end="url(#arrow)"/>

  <!-- Layer 5: Output -->
  <rect x="50" y="461" width="168" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="134" y="485" text-anchor="middle">FastAPI</text>
  <text class="ts" x="134" y="503" text-anchor="middle">REST, Pydantic v2, audit</text>

  <rect x="256" y="461" width="168" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="th" x="340" y="485" text-anchor="middle">Streamlit UI</text>
  <text class="ts" x="340" y="503" text-anchor="middle">Chat + structured report</text>

  <rect x="462" y="461" width="168" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="546" y="485" text-anchor="middle">Docker + CI/CD</text>
  <text class="ts" x="546" y="503" text-anchor="middle">GitHub Actions, Railway</text>

  <line class="arr" x1="218" y1="489" x2="254" y2="489" marker-end="url(#arrow)"/>
</svg>
